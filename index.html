<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Realtime Scoreboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>
body{
margin:0;
background:transparent;
font-family:Arial;
overflow:hidden;
}

.board{
position:absolute;
top:20px;
left:20px;
display:flex;
gap:10px;
}

.box{
background:#111;
color:#fff;
padding:10px;
border-radius:6px;
font-weight:bold;
text-align:center;
}

.team{
width:260px;
font-size:22px;
}

.score{
width:80px;
font-size:28px;
border-left:2px solid #fff;
}

.title{
background:#000;
color:#ffd700;
width:340px;
text-align:center;
padding:4px;
font-size:12px;
}
</style>
</head>

<body>

<div class="board">
  <div>
    <div class="box" id="half">1ST HALF</div>
    <div class="box" id="clock">00:00</div>
  </div>

  <div>
    <div class="title" id="title">MATCH</div>

    <div style="display:flex;">
      <div class="box team" id="team1">TEAM A</div>
      <div class="box score" id="score1">0</div>
    </div>

    <div style="display:flex;">
      <div class="box team" id="team2">TEAM B</div>
      <div class="box score" id="score2">0</div>
    </div>
  </div>
</div>

<script>
function render(data){

document.getElementById("title").innerText = data.match_title || "MATCH";
document.getElementById("team1").innerText = data.team1 || "TEAM A";
document.getElementById("team2").innerText = data.team2 || "TEAM B";

document.getElementById("score1").innerText = data.score1 || 0;
document.getElementById("score2").innerText = data.score2 || 0;

document.getElementById("half").innerText = data.half || "1ST HALF";

document.getElementById("clock").innerText =
String(data.minute || 0).padStart(2,'0') +
":" +
String(data.second || 0).padStart(2,'0');
}

async function initialLoad(){
const {data}=await supabaseClient
.from("scoreboard")
.select("*")
.eq("id",1)
.single();

if(data) render(data);
}

initialLoad();

/* 🔴 REALTIME LISTENER */
supabaseClient
.channel('scoreboard-live')
.on(
  'postgres_changes',
  {
    event: '*',
    schema: 'public',
    table: 'scoreboard',
    filter: 'id=eq.1'
  },
  (payload) => {
    render(payload.new);
  }
)
.subscribe();
</script>

</body>
</html>
