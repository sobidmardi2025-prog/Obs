<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Football Scoreboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>
body{
margin:0;
background:transparent;
font-family:Arial,sans-serif;
overflow:hidden;
}

.board{
position:absolute;
top:20px;
left:20px;
display:flex;
align-items:flex-start;
gap:8px;
}

.leftpanel{
display:flex;
flex-direction:column;
gap:6px;
}

.halfbox{
background:#111;
width:90px;
height:42px;
border-radius:4px;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
font-weight:bold;
}

.timebox{
background:#111;
width:90px;
height:42px;
border-radius:4px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:bold;
}

.rightpanel{
display:flex;
flex-direction:column;
}

.title{
background:#000;
height:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:bold;
width:330px;
color:#ffd700;
}

.row{
display:flex;
height:42px;
}

.team{
width:260px;
display:flex;
align-items:center;
padding-left:10px;
font-size:22px;
font-weight:bold;
color:#fff;
}

.score{
width:70px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:bold;
border-left:2px solid #fff;
}
</style>
</head>

<body>

<div class="board">

<div class="leftpanel">
<div class="halfbox" id="half">1ST HALF</div>
<div class="timebox" id="clock">00:00</div>
</div>

<div class="rightpanel">

<div class="title" id="title">
FOOTBALL MATCH
</div>

<div class="row">
<div class="team" id="team1">TEAM A</div>
<div class="score" id="score1">0</div>
</div>

<div class="row">
<div class="team" id="team2">TEAM B</div>
<div class="score" id="score2">0</div>
</div>

</div>

</div>

<script>

async function loadData(){

const {data}=await supabaseClient
.from('scoreboard')
.select('*')
.eq('id',1)
.single();

if(!data) return;

title.innerText =
data.match_title || "MATCH";

team1.innerText =
data.team1 || "TEAM A";

team2.innerText =
data.team2 || "TEAM B";

score1.innerText =
data.score1 ?? 0;

score2.innerText =
data.score2 ?? 0;

half.innerText =
data.half || "1ST HALF";

clock.innerText =
String(data.minute || 0).padStart(2,'0')
+
":"
+
String(data.second || 0).padStart(2,'0');

team1.style.background =
`linear-gradient(90deg,
${data.team1_color1 || "#ff0000"},
${data.team1_color2 || "#990000"})`;

team2.style.background =
`linear-gradient(90deg,
${data.team2_color1 || "#ffaa00"},
${data.team2_color2 || "#ffdd00"})`;

team1.style.color =
data.team1_text_color || "#ffffff";

team2.style.color =
data.team2_text_color || "#ffffff";

half.style.color =
data.half_text_color || "#ffffff";

clock.style.color =
data.time_text_color || "#ffffff";

score1.style.background =
data.score_bg_color || "#ffffff";

score2.style.background =
data.score_bg_color || "#ffffff";

score1.style.color =
data.score_text_color || "#000000";

score2.style.color =
data.score_text_color || "#000000";

}

loadData();
setInterval(loadData,500);

</script>

</body>
</html>
