<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Professional Football Scoreboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>
body{
margin:0;
background:transparent;
font-family:Arial,sans-serif;
overflow:hidden;
}

.board{
position:absolute;
top:20px;
left:20px;
display:flex;
align-items:center;
gap:8px;
}

.left-panel{
display:flex;
flex-direction:column;
gap:6px;
}

.half-box{
width:95px;
height:38px;
background:#111;
border:2px solid #fff;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.time-box{
width:95px;
height:52px;
background:#111;
border:2px solid #fff;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:22px;
}

.main{
width:450px;
}

.title{
background:#000;
padding:5px;
text-align:center;
font-size:14px;
font-weight:bold;
border-radius:8px 8px 0 0;
}

.team-row{
height:52px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
font-weight:bold;
font-size:24px;
}

.team-name{
flex:1;
}

.score-box{
width:58px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
border-radius:8px;
}

.vs{
background:#000;
color:#fff;
border:2px solid #fff;
border-radius:8px;
padding:8px 12px;
font-weight:bold;
font-size:18px;
}
</style>
</head>

<body>

<div class="board">

<div class="left-panel">

<div class="half-box">
<span id="half">1ST HALF</span>
</div>

<div class="time-box">
<span id="clock">00:00</span>
</div>

</div>

<div class="main">

<div class="title" id="title">
FOOTBALL TOURNAMENT
</div>

<div class="team-row" id="team1Row">

<div class="team-name" id="team1">
HOME
</div>

<div class="score-box" id="score1Box">
<span id="score1">0</span>
</div>

</div>

<div class="team-row" id="team2Row">

<div class="team-name" id="team2">
AWAY
</div>

<div class="score-box" id="score2Box">
<span id="score2">0</span>
</div>

</div>

</div>

<div class="vs">
VS
</div>

</div>

<script>

async function loadData(){

const {data}=await supabaseClient
.from('scoreboard')
.select('*')
.eq('id',1)
.single();

if(!data) return;

title.innerText=data.match_title || "MATCH";

team1.innerText=data.team1 || "HOME";
team2.innerText=data.team2 || "AWAY";

score1.innerText=data.score1 ?? 0;
score2.innerText=data.score2 ?? 0;

half.innerText=data.half || "1ST HALF";

clock.innerText=
String(data.minute).padStart(2,'0')
+ ":"
+
String(data.second).padStart(2,'0');

team1Row.style.background=
`linear-gradient(90deg,
${data.team1_color1},
${data.team1_color2})`;

team2Row.style.background=
`linear-gradient(90deg,
${data.team2_color1},
${data.team2_color2})`;

title.style.color=
data.title_color || "#ffd700";

half.style.color=
data.half_text_color || "#ffffff";

clock.style.color=
data.time_text_color || "#ffffff";

team1.style.color=
data.team1_text_color || "#ffffff";

team2.style.color=
data.team2_text_color || "#ffffff";

score1Box.style.background=
data.score_bg_color || "#ffffff";

score2Box.style.background=
data.score_bg_color || "#ffffff";

score1.style.color=
data.score_text_color || "#000000";

score2.style.color=
data.score_text_color || "#000000";

}

loadData();
setInterval(loadData,1000);

</script>

</body>
</html>
