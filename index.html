<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Football Scoreboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>
body{
margin:0;
background:transparent;
font-family:Arial,sans-serif;
overflow:hidden;
}

.board{
position:absolute;
top:20px;
left:20px;
display:flex;
align-items:center;
}

.left{
background:#111;
color:#fff;
width:95px;
height:84px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#half{
font-size:18px;
font-weight:bold;
}

#clock{
font-size:28px;
font-weight:bold;
}

.right{
display:flex;
flex-direction:column;
}

.teamrow{
display:flex;
height:42px;
}

.team{
width:240px;
display:flex;
align-items:center;
padding-left:12px;
font-size:24px;
font-weight:bold;
color:#fff;
}

.score{
width:60px;
background:#fff;
color:#000;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
}

.title{
background:#000;
color:#ffd700;
padding:4px 10px;
font-size:14px;
font-weight:bold;
text-align:center;
}
</style>
</head>

<body>

<div class="board">

<div class="left">
<div id="half">1ST</div>
<div id="clock">00:00</div>
</div>

<div class="right">

<div class="title" id="title">
FOOTBALL MATCH
</div>

<div class="teamrow">
<div class="team" id="team1">HOME</div>
<div class="score" id="score1">0</div>
</div>

<div class="teamrow">
<div class="team" id="team2">AWAY</div>
<div class="score" id="score2">0</div>
</div>

</div>

</div>

<script>

async function loadData(){

const { data } = await supabaseClient
.from('scoreboard')
.select('*')
.eq('id',1)
.single();

if(!data) return;

document.getElementById("title").innerText =
data.match_title || "";

document.getElementById("team1").innerText =
data.team1 || "HOME";

document.getElementById("team2").innerText =
data.team2 || "AWAY";

document.getElementById("score1").innerText =
data.score1 ?? 0;

document.getElementById("score2").innerText =
data.score2 ?? 0;

document.getElementById("half").innerText =
data.half || "1ST";

document.getElementById("clock").innerText =
String(data.minute).padStart(2,'0')
+
":"
+
String(data.second).padStart(2,'0');

document.getElementById("team1").style.background =
`linear-gradient(90deg,
${data.team1_color1},
${data.team1_color2})`;

document.getElementById("team2").style.background =
`linear-gradient(90deg,
${data.team2_color1},
${data.team2_color2})`;

}

loadData();
setInterval(loadData,1000);

</script>

</body>
</html>
