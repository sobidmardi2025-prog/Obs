<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Scoreboard</title>
<style>
body{
margin:0;
background:transparent;
font-family:Arial,sans-serif;
}
.board{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
display:flex;
align-items:center;
background:#111;
color:white;
border-radius:12px;
overflow:hidden;
}
.team{
padding:15px 25px;
font-size:28px;
font-weight:bold;
}
.score{
background:#222;
padding:15px 20px;
font-size:40px;
font-weight:bold;
}
.timer{
background:#ffcc00;
color:black;
padding:15px 20px;
font-size:28px;
font-weight:bold;
}
</style>
</head>
<body>

<div class="board">
<div class="team" id="team1">TEAM A</div>
<div class="score" id="score1">0</div>
<div class="timer" id="timer">00:00</div>
<div class="score" id="score2">0</div>
<div class="team" id="team2">TEAM B</div>
</div>

<script>
function loadData(){
let d=JSON.parse(localStorage.getItem("scoreboard")||"{}");
document.getElementById("team1").innerText=d.team1||"TEAM A";
document.getElementById("team2").innerText=d.team2||"TEAM B";
document.getElementById("score1").innerText=d.score1||0;
document.getElementById("score2").innerText=d.score2||0;
document.getElementById("timer").innerText=d.timer||"00:00";
}
setInterval(loadData,500);
</script>

</body>
</html>
