    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Broadcast Football Scoreboard</title>

<style>
  /* Blue Broadcast Wings */

.left{
position:relative;
overflow:visible;
}

.left::after{

content:"";

position:absolute;

right:-45px;
top:10px;

width:70px;
height:60px;

background:linear-gradient(90deg,#25d7ff,#0099ff);

clip-path:polygon(0 50%,100% 0,100% 100%);

filter:drop-shadow(0 0 15px #00bfff);

}

.right{
position:relative;
overflow:visible;
}

.right::before{

content:"";

position:absolute;

left:-45px;
top:10px;

width:70px;
height:60px;

background:linear-gradient(90deg,#0099ff,#25d7ff);

clip-path:polygon(0 0,100% 50%,0 100%);

filter:drop-shadow(0 0 15px #00bfff);

}

/* Animation */

#scoreboard{

animation:fadeIn .7s ease;

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(-30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.center{

box-shadow:
0 0 25px rgba(0,180,255,.45),
0 8px 20px rgba(0,0,0,.35);

}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:transparent;
}

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:flex-start;
pointer-events:none;
}

#scoreboard{

margin-top:25px;

width:920px;
height:120px;

display:flex;
align-items:center;
justify-content:center;

filter:drop-shadow(0 10px 18px rgba(0,0,0,.45));

}

/* LEFT */

.team{

width:260px;
height:80px;

display:flex;
align-items:center;
justify-content:center;

font-size:34px;
font-weight:bold;
color:#fff;

}

.left{

background:linear-gradient(180deg,#1fd5b7,#00a88b);

border-radius:40px 0 0 40px;

}

/* CENTER */

.center{

width:380px;
height:110px;

background:linear-gradient(180deg,#ffffff,#dcdcdc);

border:4px solid #00A8FF;

border-radius:30px;

display:flex;

justify-content:space-around;

align-items:center;

}

/* TIMER */

#timer{

font-size:32px;

font-weight:bold;

color:#111;

}

/* SCORE */

#score{

font-size:50px;

font-weight:bold;

color:#111;

}

/* RIGHT */

.right{

background:linear-gradient(180deg,#ffd84b,#ffad00);

border-radius:0 40px 40px 0;

}

</style>

</head>

<body>

<div id="overlay">

<div id="scoreboard">

<div class="team left" id="teamA">

TEAM A

</div>

<div class="center">

<div id="timer">

00:00

</div>

<div id="score">

0 : 0

</div>

</div>

<div class="team right" id="teamB">

TEAM B

</div>

</div>

</div>



// Part 1


  <script>
let minute = 0;
let second = 0;
let running = false;

const timer = document.getElementById("timer");

function updateTimer() {
    timer.textContent =
        String(minute).padStart(2, "0") + ":" +
        String(second).padStart(2, "0");
}

setInterval(() => {
    if (!running) return;

    second++;

    if (second >= 60) {
        second = 0;
        minute++;
    }

    updateTimer();
}, 1000);

function startTimer() {
    running = true;
}

function pauseTimer() {
    running = false;
}

function resetTimer() {
    running = false;
    minute = 0;
    second = 0;
    updateTimer();
}

updateTimer();
  </script>

</body>
</html>
