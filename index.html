<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Football Scoreboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>
body{
margin:0;
background:transparent;
font-family:Arial,sans-serif;
overflow:hidden;
}

.board{
position:absolute;
top:20px;
left:20px;
display:flex;
align-items:flex-start;
gap:8px;
}

.leftpanel{
display:flex;
flex-direction:column;
gap:6px;
}

.halfbox,
.timebox{
background:#111;
color:#fff;
width:90px;
height:42px;
border-radius:4px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.halfbox{
font-size:18px;
}

.timebox{
font-size:24px;
}

.rightpanel{
display:flex;
flex-direction:column;
}

.title{
background:#000;
color:#ffd700;
height:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:bold;
width:330px;
}

.row{
display:flex;
height:42px;
}

.team{
width:260px;
display:flex;
align-items:center;
padding-left:10px;
font-size:22px;
font-weight:bold;
color:#fff;
}

.score{
width:70px;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:bold;
color:#000;
border-left:2px solid #ddd;
}

#team1{
background:linear-gradient(90deg,#ff0000,#00ff00);
}

#team2{
background:linear-gradient(90deg,#ff0000,#ffff66);
}
</style>
</head>

<body>

<div class="board">

<div class="leftpanel">
<div class="halfbox" id="half">1ST</div>
<div class="timebox" id="clock">00:00</div>
</div>

<div class="rightpanel">

<div class="title" id="title">
FOOTBALL MATCH
</div>

<div class="row">
<div class="team" id="team1">TEAM A</div>
<div class="score" id="score1">0</div>
</div>

<div class="row">
<div class="team" id="team2">TEAM B</div>
<div class="score" id="score2">0</div>
</div>

</div>

</div>

<script>

async function loadData(){

const { data } = await supabaseClient
.from('scoreboard')
.select('*')
.eq('id',1)
.single();

if(!data) return;

document.getElementById("title").innerText =
data.match_title || "MATCH";

document.getElementById("team1").innerText =
data.team1 || "TEAM A";

document.getElementById("team2").innerText =
data.team2 || "TEAM B";

document.getElementById("score1").innerText =
data.score1 ?? 0;

document.getElementById("score2").innerText =
data.score2 ?? 0;

document.getElementById("half").innerText =
data.half || "1ST";

document.getElementById("clock").innerText =
String(data.minute || 0).padStart(2,'0')
+
":"
+
String(data.second || 0).padStart(2,'0');

document.getElementById("team1").style.background =
`linear-gradient(90deg,
${data.team1_color1 || "#ff0000"},
${data.team1_color2 || "#00ff00"})`;

document.getElementById("team2").style.background =
`linear-gradient(90deg,
${data.team2_color1 || "#ff0000"},
${data.team2_color2 || "#ffff66"})`;

}

loadData();
setInterval(loadData,1000);

</script>

</body>
</html>
