<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scoreboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>
body{
margin:0;
background:transparent;
font-family:Arial,sans-serif;
overflow:hidden;
}

.board{
position:absolute;
top:20px;
left:20px;
display:flex;
align-items:center;
}

.left{
background:#111;
color:#fff;
padding:8px 12px;
text-align:center;
font-weight:bold;
}

.half{
font-size:18px;
}

.time{
font-size:38px;
}

.middle{
display:flex;
flex-direction:column;
}

.teamrow{
display:flex;
height:42px;
}

.team{
width:220px;
display:flex;
align-items:center;
padding-left:12px;
font-size:28px;
font-weight:bold;
color:white;
}

.scorebox{
width:60px;
background:white;
color:black;
font-size:32px;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
}
</style>
</head>

<body>

<div class="board">

<div class="left">
<div class="half" id="half">1ST</div>
<div class="time" id="clock">00:00</div>
</div>

<div class="middle">

<div class="teamrow">
<div class="team" id="team1">TEAM 1</div>
<div class="scorebox" id="score1">0</div>
</div>

<div class="teamrow">
<div class="team" id="team2">TEAM 2</div>
<div class="scorebox" id="score2">0</div>
</div>

</div>

</div>

<div class="time" id="clock">00:00</div>
<div class="half" id="half">1ST HALF</div>
</div>

<script>

async function loadData(){

const { data } = await supabaseClient
.from('scoreboard')
.select('*')
.eq('id',1)
.single();

if(!data) return;

document.getElementById("title").innerText =
data.match_title || "MATCH";

document.getElementById("team1").innerText =
data.team1;

document.getElementById("team2").innerText =
data.team2;

document.getElementById("score1").innerText =
data.score1;

document.getElementById("score2").innerText =
data.score2;

document.getElementById("team1").style.color =
data.team1_color1;

document.getElementById("team2").style.color =
data.team2_color1;

document.getElementById("half").innerText =
data.half;

document.getElementById("clock").innerText =
String(data.minute).padStart(2,'0')
+ ":"
+
String(data.second).padStart(2,'0');

}

loadData(document.getElementById("team1").style.background =
`linear-gradient(90deg,${data.team1_color1},${data.team1_color2})`;

document.getElementById("team2").style.background =
`linear-gradient(90deg,${data.team2_color1},${data.team2_color2})`;);

setInterval(loadData,1000);

</script>

</body>
</html>
