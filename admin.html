<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Realtime Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>
body{
background:#111;
color:#fff;
font-family:Arial;
padding:20px;
}

input,button,select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:none;
}

button{
background:#00c853;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<h2>⚙️ Realtime Admin</h2>

<input id="team1" placeholder="Team 1">
<input id="team2" placeholder="Team 2">

<input id="score1" type="number" placeholder="Score 1">
<input id="score2" type="number" placeholder="Score 2">

<input id="minute" type="number" placeholder="Minute">
<input id="second" type="number" placeholder="Second">

<select id="half">
<option>1ST HALF</option>
<option>2ND HALF</option>
<option>FULL TIME</option>
</select>

<button onclick="update()">UPDATE LIVE ⚡</button>

<script>
async function update(){

await supabaseClient
.from("scoreboard")
.update({
team1: team1.value,
team2: team2.value,
score1: Number(score1.value||0),
score2: Number(score2.value||0),
minute: Number(minute.value||0),
second: Number(second.value||0),
half: half.value
})
.eq("id",1);

alert("Updated ⚡ (Realtime will reflect instantly)");
}
</script>

</body>
</html>
