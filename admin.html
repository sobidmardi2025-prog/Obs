<script>

let timer = null;

async function getData() {
  const { data } = await supabaseClient
    .from('scoreboard')
    .select('*')
    .eq('id', 1)
    .single();

  return data;
}

async function saveTeams() {

  await supabaseClient
    .from('scoreboard')
    .update({

      match_title: title.value,

      team1: team1.value,
      team2: team2.value,

      team1_color1: c11.value,
      team1_color2: c12.value,

      team2_color1: c21.value,
      team2_color2: c22.value,

      title_color: title_color.value,
      half_text_color: half_text_color.value,
      time_text_color: time_text_color.value,

      team1_text_color: team1_text_color.value,
      team2_text_color: team2_text_color.value,

      score_bg_color: score_bg_color.value,
      score_text_color: score_text_color.value

    })
    .eq('id', 1);

  alert("Saved");
}

async function goal1(v) {

  let d = await getData();

  await supabaseClient
    .from('scoreboard')
    .update({
      score1: Math.max(0, (d.score1 || 0) + v)
    })
    .eq('id', 1);
}

async function goal2(v) {

  let d = await getData();

  await supabaseClient
    .from('scoreboard')
    .update({
      score2: Math.max(0, (d.score2 || 0) + v)
    })
    .eq('id', 1);
}

async function setHalf(h) {

  await supabaseClient
    .from('scoreboard')
    .update({
      half: h
    })
    .eq('id', 1);
}

async function startTimer() {

  if (timer) return;

  await supabaseClient
    .from('scoreboard')
    .update({
      running: true,
      last_start: Date.now()
    })
    .eq('id', 1);

  timer = setInterval(async () => {

    let d = await getData();

    if (!d.running) return;

    let m = parseInt(d.minute || 0);
    let s = parseInt(d.second || 0);

    s++;

    if (s >= 60) {
      m++;
      s = 0;
    }

    await supabaseClient
      .from('scoreboard')
      .update({
        minute: m,
        second: s
      })
      .eq('id', 1);

  }, 1000);
}

async function stopTimer() {

  clearInterval(timer);
  timer = null;

  await supabaseClient
    .from('scoreboard')
    .update({
      running: false
    })
    .eq('id', 1);
}

async function resetTimer() {

  clearInterval(timer);
  timer = null;

  await supabaseClient
    .from('scoreboard')
    .update({
      minute: 0,
      second: 0,
      running: false,
      last_start: 0
    })
    .eq('id', 1);
}

</script>
