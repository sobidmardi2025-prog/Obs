<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Football Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>
body{
margin:0;
background:#0f0f0f;
color:#fff;
font-family:Arial;
padding:20px;
}

h2{
text-align:center;
color:#ffd700;
}

.box{
max-width:400px;
margin:auto;
background:#1a1a1a;
padding:15px;
border-radius:10px;
}

input,select,button{
width:100%;
padding:10px;
margin:6px 0;
border-radius:5px;
border:none;
font-size:14px;
}

button{
background:#00c853;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00b34a;
}
</style>
</head>

<body>

<h2>⚙️ ADMIN PANEL</h2>

<div class="box">

<input id="match_title" placeholder="Match Title">
<input id="team1" placeholder="Team 1">
<input id="team2" placeholder="Team 2">

<input id="score1" type="number" placeholder="Score 1">
<input id="score2" type="number" placeholder="Score 2">

<input id="minute" type="number" placeholder="Minute">
<input id="second" type="number" placeholder="Second">

<select id="half">
  <option value="1ST HALF">1ST HALF</option>
  <option value="2ND HALF">2ND HALF</option>
  <option value="FULL TIME">FULL TIME</option>
</select>

<h4>🎨 Colors</h4>

<input id="team1_color1" placeholder="Team1 Color1">
<input id="team1_color2" placeholder="Team1 Color2">

<input id="team2_color1" placeholder="Team2 Color1">
<input id="team2_color2" placeholder="Team2 Color2">

<input id="team1_text_color" placeholder="Team1 Text Color">
<input id="team2_text_color" placeholder="Team2 Text Color">

<input id="half_text_color" placeholder="Half Text Color">
<input id="time_text_color" placeholder="Time Text Color">

<input id="score_bg_color" placeholder="Score BG Color">
<input id="score_text_color" placeholder="Score Text Color">

<button onclick="update()">🔴 UPDATE LIVE</button>

</div>

<script>
async function update(){

  const { error } = await supabaseClient
    .from("scoreboard")
    .update({
      match_title: document.getElementById("match_title").value,
      team1: document.getElementById("team1").value,
      team2: document.getElementById("team2").value,

      score1: Number(document.getElementById("score1").value || 0),
      score2: Number(document.getElementById("score2").value || 0),

      minute: Number(document.getElementById("minute").value || 0),
      second: Number(document.getElementById("second").value || 0),

      half: document.getElementById("half").value,

      team1_color1: document.getElementById("team1_color1").value,
      team1_color2: document.getElementById("team1_color2").value,

      team2_color1: document.getElementById("team2_color1").value,
      team2_color2: document.getElementById("team2_color2").value,

      team1_text_color: document.getElementById("team1_text_color").value,
      team2_text_color: document.getElementById("team2_text_color").value,

      half_text_color: document.getElementById("half_text_color").value,
      time_text_color: document.getElementById("time_text_color").value,

      score_bg_color: document.getElementById("score_bg_color").value,
      score_text_color: document.getElementById("score_text_color").value

    })
    .eq("id", 1);

  if(error){
    alert("❌ Error: " + error.message);
  } else {
    alert("✅ Updated Successfully!");
  }
}
</script>

</body>
</html>
